<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoliaSync</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 100%;
      max-width: 400px;
      min-width: 280px;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    @media (max-width: 340px) {
      body { min-width: 0; font-size: 14px; }
      main { padding: 12px; }
      .info-value { max-width: 120px; }
    }

    header {
      background: #16213e;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 2px solid #2196f3;
    }

    header img {
      width: 32px;
      height: 32px;
    }

    header h1 {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }

    header span {
      font-size: 11px;
      color: #90caf9;
    }

    main {
      padding: 16px;
    }

    /* ── Logged out ── */
    #view-loggedout {
      text-align: center;
    }

    #view-loggedout p {
      font-size: 13px;
      color: #9e9e9e;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    /* ── Logged in ── */
    #view-loggedin {
      display: none;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #2a2a4a;
      font-size: 13px;
    }

    .info-row:last-of-type {
      border-bottom: none;
    }

    .info-label {
      color: #90caf9;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info-value {
      color: #fff;
      font-size: 13px;
      text-align: right;
      max-width: 170px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }

    .status-success { background: #1b5e20; color: #a5d6a7; }
    .status-error   { background: #4e342e; color: #ffab91; }
    .status-none    { background: #263238; color: #78909c; }

    /* ── Buttons ── */
    .btn {
      display: block;
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 12px;
    }

    .btn:hover  { opacity: 0.85; }
    .btn:active { opacity: 0.7; }

    .btn-primary {
      background: #2196f3;
      color: #fff;
    }

    .btn-secondary {
      background: #263238;
      color: #90caf9;
      border: 1px solid #37474f;
    }

    .btn-danger {
      background: transparent;
      color: #ef9a9a;
      border: 1px solid #4e342e;
      margin-top: 8px;
    }

    /* ── Spinner ── */
    #loading {
      text-align: center;
      padding: 24px 0;
      color: #90caf9;
      font-size: 13px;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #37474f;
      border-top-color: #2196f3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error message ── */
    #error-msg {
      display: none;
      background: #4e342e;
      color: #ffab91;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      margin-top: 10px;
      line-height: 1.4;
    }

    footer {
      padding: 8px 16px 12px;
      text-align: center;
    }

    footer a {
      font-size: 11px;
      color: #546e7a;
      text-decoration: none;
    }

    footer a:hover { color: #90caf9; }
  </style>
</head>
<body>

  <header>
    <img src="icons/icon48.png" alt="Logo" id="header-logo" />
    <div>
      <h1>RoliaSync</h1>
      <span>Manga sync</span>
    </div>
  </header>

  <main>

    <!-- Loading -->
    <div id="loading">
      <div class="spinner"></div>
      <div>Loading…</div>
    </div>

    <!-- Logged out -->
    <div id="view-loggedout" style="display:none;">
      <p>Sign in with your MyAnimeList account to automatically sync read chapters.</p>
      <button class="btn btn-primary" id="btn-login">🔑 Sign in with MAL</button>
    </div>

    <!-- Logged in -->
    <div id="view-loggedin" style="display:none;">
      <div class="info-row">
        <span class="info-label">Account</span>
        <span class="info-value" id="username">–</span>
      </div>
      <div class="info-row">
        <span class="info-label">Last sync</span>
        <span class="info-value" id="last-sync-title">–</span>
      </div>
      <div class="info-row">
        <span class="info-label">Chapter</span>
        <span class="info-value" id="last-sync-chapter">–</span>
      </div>
      <div class="info-row">
        <span class="info-label">Status</span>
        <span class="info-value" id="last-sync-status">
          <span class="status-badge status-none">No sync yet</span>
        </span>
      </div>
      <div class="info-row">
        <span class="info-label">Time</span>
        <span class="info-value" id="last-sync-time">–</span>
      </div>

      <button class="btn btn-secondary" id="btn-history">📋 Open history</button>
      <button class="btn btn-secondary" id="btn-show-logs" style="margin-top:6px;font-size:11px;opacity:0.6;">[DEV] Show Logs</button>
      <button class="btn btn-danger" id="btn-logout">Sign out</button>
    </div>

    <div id="error-msg"></div>

  </main>

  <footer>
    <a href="https://myanimelist.net" target="_blank">myanimelist.net</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
